version: 2

sources:
  - name: stripe
    database: raw 
    schema: stripe 
    tables:
      - name: payment
        identifier: payment  # the actual name of the table in case it's different than the name we want to use for referencing
        config: 
          freshness:
            warn_after:
              count: 6
              period: hour
            error_after:
              count: 12
              period: hour
          loaded_at_field: _etl_loaded_at