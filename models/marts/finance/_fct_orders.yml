models:
- name: fct_orders
  description: Orders fact table at the order level. This table contains one row per
    order and includes the order date and payment finalized date.
  config: 
    contract: 
      enforced: true
    group: finance
    access: public
  columns:
  - name: order_id
    data_type: bigint
    description: Primary key for orders
    tests:
      - unique
      - not_null:
          config: 
            severity: warn
            error_if: ">= 100"
            store_failures: true
  - name: customer_id
    data_type: bigint
    tests:
      - relationships:
          arguments:
            to: ref('stg_jaffle_shop__customers')
            field: customer_id
      # this test should raise a warning, use `dbt test -s fct_orders --store-failures` to find results --> select * from analytics.dbt_sventafridda.unique_fct_orders_customer_id
      - unique:
          config: 
            severity: warn
  - name: order_date
    data_type: date
  - name: order_status
    data_type: string
  - name: total_amount_paid
    description: The total amount paid for the orders
    data_type: double
    tests: 
      - greater_than_x:
          arguments:
            _model: ref('fct_orders')
            column_name: customer_id
            x: 1
      - dbt_expectations.expect_column_values_to_be_between: 
      # this will perform what the dbt_utils.expression-is-true test does!
          arguments:
            min_value: 0
            row_condition: "order_id is not null"
            strictly: false
      - dbt_expectations.expect_column_mean_to_be_between: 
      # this will perform what our singular and generic tests do!
          arguments:
            min_value: 1
            group_by: [customer_id] 
            row_condition: "order_id is not null" # (Optional)
            strictly: false
      - dbt_utils.expression_is_true:
          arguments:
            expression: ">=0"
            config:
              where: "order_date = current_date() "
  - name: payment_finalized_date
    data_type: date
  - name: first_name
    data_type: string
  - name: last_name
    data_type: string
  - name: transaction_seq
    description: The sequence of the transaction.
    data_type: int
  - name: customer_sales_seq
    data_type: int
  - name: nvsr
    data_type: string
  - name: customer_lifetime_value
    description: The lifetime value of the customer.
    data_type: double
  - name: fdos
    data_type: date
